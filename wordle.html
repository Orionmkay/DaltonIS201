<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            border-bottom: 1px solid #d3d6da;
            padding: 12px 0;
            text-align: center;
            position: relative;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #1a1a1b;
        }

        .back-link {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            color: #787c7e;
            text-decoration: none;
        }

        .back-link:hover {
            color: #1a1a1b;
        }

        #message-bar {
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px 0;
            font-size: 0.9rem;
            font-weight: bold;
            color: #1a1a1b;
        }

        /* Game Board */
        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 0;
            margin-bottom: 10px;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            padding: 10px 0;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }

        .tile {
            width: 62px;
            height: 62px;
            border: 2px solid #d3d6da;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #1a1a1b;
            user-select: none;
            transition: border-color 0.1s;
        }

        .tile.filled {
            border-color: #878a8c;
            animation: pop 0.1s ease-in-out;
        }

        .tile.correct {
            background-color: #6aaa64;
            border-color: #6aaa64;
            color: white;
        }

        .tile.present {
            background-color: #c9b458;
            border-color: #c9b458;
            color: white;
        }

        .tile.absent {
            background-color: #787c7e;
            border-color: #787c7e;
            color: white;
        }

        .tile.revealed {
            animation: flip 0.5s ease forwards;
        }

        @keyframes pop {
            0%  { transform: scale(1); }
            50% { transform: scale(1.12); }
            100%{ transform: scale(1); }
        }

        @keyframes flip {
            0%   { transform: rotateX(0); }
            50%  { transform: rotateX(-90deg); }
            100% { transform: rotateX(0); }
        }

        .tile.shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }

        /* Keyboard */
        #keyboard {
            width: 100%;
            max-width: 500px;
            padding: 0 8px;
            margin-bottom: 20px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .key {
            height: 58px;
            min-width: 43px;
            padding: 0 4px;
            border-radius: 4px;
            border: none;
            background-color: #d3d6da;
            color: #1a1a1b;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: background-color 0.2s;
        }

        .key:active {
            opacity: 0.7;
        }

        .key.wide {
            min-width: 65px;
            font-size: 0.75rem;
        }

        .key.correct {
            background-color: #6aaa64;
            color: white;
        }

        .key.present {
            background-color: #c9b458;
            color: white;
        }

        .key.absent {
            background-color: #787c7e;
            color: white;
        }

        /* Modal */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 99;
            justify-content: center;
            align-items: center;
        }

        #modal-overlay.show {
            display: flex;
        }

        #modal-box {
            background: white;
            border-radius: 10px;
            padding: 30px 40px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        #modal-box h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1a1a1b;
        }

        #modal-box p {
            color: #787c7e;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        #modal-box .answer {
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: #1a1a1b;
            margin: 12px 0;
        }

        #play-again-btn {
            background-color: #6aaa64;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #play-again-btn:hover {
            background-color: #538d4e;
        }
    </style>
</head>
<body>

    <header>
        <a href="fishing.html" class="back-link">← Back</a>
        <h1>Wordle</h1>
    </header>

    <div id="message-bar"></div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row" id="row-1"></div>
        <div class="keyboard-row" id="row-2"></div>
        <div class="keyboard-row" id="row-3"></div>
    </div>

    <!-- End Game Modal -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h2 id="modal-title">Good Job!</h2>
            <p id="modal-subtitle">You got it in</p>
            <div class="answer" id="modal-answer"></div>
            <p id="modal-extra"></p>
            <button id="play-again-btn" onclick="startNewGame()">Play Again</button>
        </div>
    </div>

    <script>
        // ---- Word List ----
        const WORDS = [
            "about","above","abuse","actor","acute","admit","adopt","adult","after","agent",
            "agree","ahead","alarm","album","alert","allow","alone","along","alter","angel",
            "anger","angle","angry","ankle","apart","apple","apply","arise","aside","asset",
            "avoid","awake","award","aware","badly","baker","basic","basis","batch","beach",
            "began","being","bench","black","blade","blame","blank","blast","blaze","bleed",
            "blend","block","blood","bloom","blown","blues","blunt","board","bonus","boost",
            "bound","boxer","brand","brave","bread","break","breed","brief","bring","broad",
            "broke","brush","build","built","burst","buyer","candy","carry","carve","catch",
            "cause","chain","chair","chaos","charm","chart","chase","cheap","check","chess",
            "child","chunk","civic","civil","claim","class","clean","clear","climb","clock",
            "clone","close","cloud","coach","coast","coral","could","court","cover","crack",
            "craft","crane","crazy","cream","creek","crime","crisp","cross","crowd","crown",
            "crude","cruel","crush","curve","daily","dance","death","debut","delay","depth",
            "derby","dirty","doubt","dough","draft","drain","drama","drank","drawn","dread",
            "dream","dress","drink","drive","drove","drown","dully","dummy","dunno","eagle",
            "early","earth","eight","elect","elite","empty","enemy","enjoy","enter","equal",
            "error","essay","event","every","exact","exist","extra","faint","faith","false",
            "fancy","fatal","fault","feast","fence","fetch","fever","fewer","fiber","field",
            "fifth","fight","final","first","fixed","flame","flash","flesh","float","flood",
            "floor","flour","fluid","flush","focus","force","forge","forte","found","frame",
            "frank","fraud","fresh","front","frost","froze","fruit","funny","giant","given",
            "gland","glass","glaze","gleam","gloom","glove","going","grace","grade","grain",
            "grand","grant","grasp","grass","grave","great","greed","green","greet","grief",
            "grind","groan","grope","gross","group","grove","grown","guard","guess","guest",
            "guide","guild","guilt","guise","happy","harsh","haven","heart","heavy","hence",
            "herbs","hinge","honor","horse","hotel","house","human","humor","hurry","ideal",
            "image","imply","index","infer","inner","input","irony","issue","ivory","japan",
            "jelly","jimmy","joint","judge","juice","juicy","jumpy","keeps","knife","knock",
            "known","label","large","laser","later","laugh","layer","learn","lease","least",
            "legal","lemon","level","light","limit","linen","liver","logic","loose","lover",

            "maple","march","marsh","match","mayor","media","mercy","metal","might","minor",

            "moved","movie","muddy","multi","music","naive","nasty","naval","nerve","never",

            "place","plain","plane","plant","plate","plaza","plead","pluck","plumb","plume",

            "press","price","pride","prime","print","prism","prize","probe","prone","proof",
            "prose","prove","proxy","prune","psalm","pulse","pupil","purse","queen","query",
            "queue","quick","quiet","quota","quote","rabbi","radar","radio","raise","range",
            "rapid","ratio","reach","react","ready","realm","rebel","reign","relax","repay",
            "repel","rerun","reset","rider","ridge","right","risky","rivet","robot","rocky",
            "rouge","rough","round","route","royal","rugby","ruler","rural","salad","sauce",
            "scale","scare","scene","scent","score","scout","screw","seize","sense","serve",
            "seven","shade","shall","shame","shape","share","shark","sharp","shelf","shell",
            "shift","shirt","shock","shore","short","shout","shown","shrub","sight","since",
            "sixth","skill","skull","slate","slave","sleep","sleet","slept","slice","slide",
            "slope","small","smart","smell","smile","smirk","smoke","sneak","snore","solar",
            "solid","solve","sorry","south","space","spare","speak","spend","spice","spine",
            "split","spoke","spoon","sport","staff","stage","stain","stair","stake","stale",
            "stall","stamp","stand","start","state","stays","steam","steel","steep","steer",
            "stick","stiff","still","stone","stood","stool","store","storm","story","stove",
            "stuck","study","stuff","style","sugar","suite","sunny","super","surge","swamp",
            "swear","sweet","swept","swift","swing","swore","sworn","syrup","table","taken",
            "taste","teach","teeth","tempo","tense","terms","their","theme","there","these",
            "thick","thing","think","thorn","those","threw","throw","thumb","tiger","tight",
            "timer","tired","title","today","token","tooth","topic","total","touch","tough",
            "towel","tower","toxic","trace","track","trade","train","trait","trash","treat",
            "trend","trial","tribe","trick","tried","troop","trout","truck","truly","trump",
            "trunk","trust","truth","tumor","tumor","tuned","tunes","twice","twist","tying",
            "typed","ultra","uncle","under","unify","union","until","upper","upset","urban",
            "usage","usual","usher","valid","value","valve","video","vigor","viral","virus",
            "visit","visor","vital","vivid","vocal","voice","voter","wagon","waste","watch",
            "water","weary","weave","wedge","weird","whale","wheat","wheel","where","which",
            "while","white","whole","whose","wider","widow","witch","woman","women","world",
            "worry","worse","worst","worth","would","wound","write","wrote","yacht","yield",
            "young","youth","zebra"
        ];

        const KEYBOARD_ROWS = [
            ['q','w','e','r','t','y','u','i','o','p'],
            ['a','s','d','f','g','h','j','k','l'],
            ['Enter','z','x','c','v','b','n','m','⌫']
        ];

        let targetWord = '';
        let currentRow = 0;
        let currentCol = 0;
        let currentGuess = [];
        let gameOver = false;
        let tileGrid = [];
        let keyStates = {};

        function pickWord() {
            return WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
        }

        function buildBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            tileGrid = [];
            for (let r = 0; r < 6; r++) {
                const rowEl = document.createElement('div');
                rowEl.classList.add('row');
                const rowTiles = [];
                for (let c = 0; c < 5; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    rowEl.appendChild(tile);
                    rowTiles.push(tile);
                }
                board.appendChild(rowEl);
                tileGrid.push(rowTiles);
            }
        }

        function buildKeyboard() {
            const rows = ['row-1','row-2','row-3'];
            KEYBOARD_ROWS.forEach((letters, i) => {
                const rowEl = document.getElementById(rows[i]);
                rowEl.innerHTML = '';
                letters.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.classList.add('key');
                    btn.textContent = letter;
                    btn.dataset.key = letter;
                    if (letter === 'Enter' || letter === '⌫') {
                        btn.classList.add('wide');
                    }
                    btn.addEventListener('click', () => handleKey(letter));
                    rowEl.appendChild(btn);
                });
            });
        }

        function handleKey(key) {
            if (gameOver) return;

            if (key === '⌫' || key === 'Backspace') {
                deleteLetter();
            } else if (key === 'Enter') {
                submitGuess();
            } else if (/^[a-zA-Z]$/.test(key)) {
                addLetter(key.toUpperCase());
            }
        }

        function addLetter(letter) {
            if (currentCol >= 5) return;
            const tile = tileGrid[currentRow][currentCol];
            tile.textContent = letter;
            tile.classList.add('filled');
            currentGuess.push(letter);
            currentCol++;
        }

        function deleteLetter() {
            if (currentCol <= 0) return;
            currentCol--;
            currentGuess.pop();
            const tile = tileGrid[currentRow][currentCol];
            tile.textContent = '';
            tile.classList.remove('filled');
        }

        function showMessage(msg, duration = 1800) {
            const bar = document.getElementById('message-bar');
            bar.textContent = msg;
            if (duration > 0) {
                setTimeout(() => { bar.textContent = ''; }, duration);
            }
        }

        function shakeRow() {
            const rowTiles = tileGrid[currentRow];
            rowTiles.forEach(tile => {
                tile.classList.add('shake');
                tile.addEventListener('animationend', () => tile.classList.remove('shake'), { once: true });
            });
        }

        function submitGuess() {
            if (currentCol < 5) {
                showMessage('Not enough letters');
                shakeRow();
                return;
            }

            const guess = currentGuess.join('');

            if (!WORDS.includes(guess.toLowerCase())) {
                showMessage('Not in word list');
                shakeRow();
                return;
            }

            // Evaluate guess
            const result = evaluateGuess(guess, targetWord);

            // Reveal tiles with delay
            result.forEach((state, i) => {
                const tile = tileGrid[currentRow][i];
                setTimeout(() => {
                    tile.classList.add('revealed', state);
                    // Update keyboard
                    const keyEl = document.querySelector(`.key[data-key="${guess[i].toLowerCase()}"]`);
                    if (keyEl) {
                        const currentState = keyStates[guess[i]];
                        if (state === 'correct') {
                            keyStates[guess[i]] = 'correct';
                            keyEl.className = 'key correct';
                        } else if (state === 'present' && currentState !== 'correct') {
                            keyStates[guess[i]] = 'present';
                            keyEl.className = 'key present';
                        } else if (state === 'absent' && !currentState) {
                            keyStates[guess[i]] = 'absent';
                            keyEl.className = 'key absent';
                        }
                    }
                }, i * 350);
            });

            const isWin = result.every(s => s === 'correct');
            const delay = 5 * 350 + 300;

            setTimeout(() => {
                if (isWin) {
                    const congrats = ['Genius!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!', 'Phew!'];
                    showEndModal(true, currentRow + 1, congrats[currentRow] || 'Nice!');
                    gameOver = true;
                } else if (currentRow >= 5) {
                    showEndModal(false, 0, '');
                    gameOver = true;
                }
            }, delay);

            currentRow++;
            currentCol = 0;
            currentGuess = [];
        }

        function evaluateGuess(guess, target) {
            const result = Array(5).fill('absent');
            const targetArr = target.split('');
            const guessArr = guess.split('');
            const usedTarget = Array(5).fill(false);
            const usedGuess = Array(5).fill(false);

            // First pass: correct
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    result[i] = 'correct';
                    usedTarget[i] = true;
                    usedGuess[i] = true;
                }
            }

            // Second pass: present
            for (let i = 0; i < 5; i++) {
                if (usedGuess[i]) continue;
                for (let j = 0; j < 5; j++) {
                    if (!usedTarget[j] && guessArr[i] === targetArr[j]) {
                        result[i] = 'present';
                        usedTarget[j] = true;
                        break;
                    }
                }
            }

            return result;
        }

        function showEndModal(won, guessCount, congratsMsg) {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');
            const answerEl = document.getElementById('modal-answer');
            const extra = document.getElementById('modal-extra');

            if (won) {
                title.textContent = congratsMsg;
                subtitle.textContent = `You got it in ${guessCount} ${guessCount === 1 ? 'guess' : 'guesses'}!`;
                answerEl.textContent = targetWord;
                extra.textContent = '';
            } else {
                title.textContent = 'Better luck next time!';
                subtitle.textContent = 'The word was:';
                answerEl.textContent = targetWord;
                extra.textContent = 'Try again?';
            }

            overlay.classList.add('show');
        }

        function startNewGame() {
            document.getElementById('modal-overlay').classList.remove('show');
            document.getElementById('message-bar').textContent = '';
            targetWord = pickWord();
            currentRow = 0;
            currentCol = 0;
            currentGuess = [];
            gameOver = false;
            keyStates = {};
            buildBoard();
            buildKeyboard();
        }

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            handleKey(e.key);
        });

        // Start game on load
        startNewGame();
    </script>

</body>
